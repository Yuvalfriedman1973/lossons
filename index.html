<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>לקחי נהיגה מבצעית בלחימה</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* ── CSS variables ── */
    :root {
      --bg:         #141a0f;
      --surface:    #4a6535;
      --card:       #253020;
      --card-hover: #2e3d28;
      --border:     #3a5030;
      --text:       #e8e8e8;
      --text-muted: #9aaa90;
      --heading:    #ffffff;
      --badge-bg:   #8b1a1a;
      --badge-text: #ffd0d0;
      --accent:     #5a8a4a;
      --search-bg:  #1a2214;
      --section-bg: #1a2214;
      --back-btn:   #3a5030;
      --back-hover: #4a6540;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: rtl;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 40px;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 16px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--heading);
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      text-align: center;
    }

    /* ── Search ── */
    .search-bar {
      width: 100%;
      background: var(--search-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      font-size: 16px; /* ≥16px prevents iOS Safari auto-zoom */
      direction: rtl;
      outline: none;
      -webkit-appearance: none; /* removes iOS Safari system search-input styling */
      appearance: none;
    }

    .search-bar::placeholder { color: var(--text-muted); }
    .search-bar:focus { border-color: var(--accent); }

    /* ── Topic list ── */
    .topic-list {
      padding: 16px 12px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .topic-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      -webkit-tap-highlight-color: transparent; /* suppress browser blue tap flash */
    }

    .topic-card:active { background: var(--card-hover); }

    .topic-card-title {
      font-size: 16px;
      font-weight: 500;
      color: var(--heading);
      flex: 1;
      line-height: 1.4;
    }

    .topic-card-arrow {
      color: var(--text-muted);
      font-size: 18px;
      flex-shrink: 0;
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      background: var(--badge-bg);
      color: var(--badge-text);
      font-size: 12px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Topic detail view ── */
    .view-topic {
      padding: 0 12px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--back-btn);
      color: var(--text);
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-family: 'Heebo', sans-serif;
      font-size: 14px;
      cursor: pointer;
      margin: 14px 0 16px;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent; /* suppress browser blue tap flash */
    }

    .back-btn:active { background: var(--back-hover); }

    .topic-detail-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--heading);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .topic-detail-badge {
      margin-bottom: 18px;
    }

    .section {
      background: var(--section-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .section-body {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .section-list {
      margin: 0;
      padding-right: 20px;
      color: var(--text);
      font-size: 15px;
      line-height: 1.8;
    }

    .section-list li {
      margin-bottom: 4px;
    }

    .section-actions {
      background: #1a2e1a;
      border: 2px solid #5a8a4a;
      border-right: 5px solid #5a8a4a;
    }

    .section-actions .section-title {
      color: #1a2e1a;
      background: #8fcc6f;
      margin: -14px -16px 12px;
      padding: 10px 16px;
      border-radius: 8px 8px 0 0;
      font-size: 14px;
    }

    .section-actions .section-list,
    .section-actions .section-body {
      color: #f0f0f0;
      font-weight: 500;
    }

    /* ── Status messages ── */
    .status-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 16px;
    }

    .status-msg.error { color: #e07070; }

    /* ── Hidden utility ── */
    .hidden { display: none !important; }

    /* ── Home / Zone selection ── */
    .zone-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 32px 20px;
    }

    .zone-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--heading);
      font-family: 'Heebo', sans-serif;
      font-size: 40px;
      font-weight: 700;
      padding: 24px 20px;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .zone-btn:active { background: var(--card-hover); }

    .zone-count {
      display: block;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-muted);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- Home view -->
    <div id="view-home">
      <div class="header">
        <h1>לקחי נהיגה מבצעית בלחימה</h1>
      </div>
      <div style="padding: 12px 20px 0;">
        <input id="home-search" class="search-bar" type="search" placeholder="חיפוש בכל האזורים..." aria-label="חיפוש בכל האזורים" />
      </div>
      <div id="home-search-results" class="topic-list hidden" style="padding: 12px;"></div>
      <div id="zone-list-container">
        <div class="zone-list">
          <button class="zone-btn" data-zone="lebanon">לבנון<span class="zone-count" id="count-lebanon"></span></button>
          <button class="zone-btn" data-zone="gaza">עזה<span class="zone-count" id="count-gaza"></span></button>
          <button class="zone-btn" data-zone="syria">סוריה<span class="zone-count" id="count-syria"></span></button>
        </div>
      </div>
    </div>

    <!-- Shared header (main + topic views) -->
    <div class="header hidden" id="main-header">
      <h1>לקחי נהיגה מבצעית בלחימה</h1>
      <input
        id="search"
        class="search-bar"
        type="search"
        placeholder="חיפוש..."
        aria-label="חיפוש בלקחים"
      />
    </div>

    <!-- Main view (no header inside) -->
    <div id="view-main" class="hidden">
      <div style="padding: 10px 12px 0;">
        <button class="back-btn" id="back-home-btn">בחזרה</button>
      </div>
      <div id="topic-list" class="topic-list">
        <div class="status-msg">טוען נתונים...</div>
      </div>
    </div>

    <!-- Topic detail view (no header inside) -->
    <div id="view-topic" class="hidden">
      <div class="view-topic">
        <button class="back-btn" id="back-btn">בחזרה</button>
        <div id="topic-detail-content"></div>
      </div>
    </div>

  </div>
  <script>
    const ZONES = [
      { id: 'lebanon', name: 'לבנון', url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRU3T8932BlscRE4i9IxwNE2gntwny714mhYASMdp_h_2MHlN2kFFIesbCLiwgP_ZnVcSbilm2-BxSj/pub?gid=0&single=true&output=csv' },
      { id: 'gaza',    name: 'עזה',   url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRU3T8932BlscRE4i9IxwNE2gntwny714mhYASMdp_h_2MHlN2kFFIesbCLiwgP_ZnVcSbilm2-BxSj/pub?gid=1787717414&single=true&output=csv' },
      { id: 'syria',   name: 'סוריה', url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRU3T8932BlscRE4i9IxwNE2gntwny714mhYASMdp_h_2MHlN2kFFIesbCLiwgP_ZnVcSbilm2-BxSj/pub?gid=1613392289&single=true&output=csv' },
    ];
    let activeZone = null;

    const zonesCache = {};
    let zonesLoading = false;

    async function loadAllZones() {
      if (zonesLoading) return;
      zonesLoading = true;
      await Promise.all(ZONES.map(async zone => {
        if (zonesCache[zone.id]) return;
        const raw = await loadTopics(zone.url);
        zonesCache[zone.id] = raw ? sortTopics(raw) : [];
      }));
    }

    function parseCSV(text) {
      const rows = [];
      text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      let i = 0;
      while (i < text.length) {
        const row = [];
        while (i < text.length) {
          let field = '';
          if (text[i] === '"') {
            i++;
            while (i < text.length) {
              if (text[i] === '"') {
                if (text[i + 1] === '"') { field += '"'; i += 2; }
                else { i++; break; }
              } else {
                field += text[i++];
              }
            }
          } else {
            while (i < text.length && text[i] !== ',' && text[i] !== '\n') {
              field += text[i++];
            }
            field = field.trim();
          }
          row.push(field);
          if (i < text.length && text[i] === ',') { i++; }
          else { break; }
        }
        if (i < text.length && text[i] === '\n') i++;
        if (row.length > 0 && !(row.length === 1 && row[0] === '')) rows.push(row);
      }
      return rows;
    }

    function rowsToTopics(rows) {
      const topics = [];
      let current = null;
      let currentField = null;

      for (const row of rows) {
        const text = (row[0] || '').trim();
        if (!text) continue;

        if (/^נושא/.test(text)) {
          if (current) topics.push(current);
          const title = text.replace(/^נושא\s*\d*\s*[:\-–]\s*/, '').trim();
          current = { title, recurrence_count: 1, causes: '', conclusions: '', actions: '' };
          currentField = null;
        } else if (/^סיבות?\s*:/.test(text)) {
          if (current) {
            current.causes = text.replace(/^סיבות?\s*:\s*/, '').trim();
            currentField = 'causes';
          }
        } else if (/^מסקנות?\s*:/.test(text)) {
          if (current) {
            current.conclusions = text.replace(/^מסקנות?\s*:\s*/, '').trim();
            currentField = 'conclusions';
          }
        } else if (/^מה יש לעשות/.test(text)) {
          if (current) {
            current.actions = text.replace(/^מה יש לעשות[^:]*:\s*/, '').trim();
            currentField = 'actions';
          }
        } else if (/^מס/.test(text) && /פעמים/.test(text)) {
          if (current) {
            const val = text.replace(/^[^:]+:\s*/, '').trim();
            const n = parseInt(val, 10);
            current.recurrence_count = isNaN(n) ? 1 : n;
            currentField = null;
          }
        } else if (current && currentField) {
          current[currentField] = current[currentField]
            ? current[currentField] + '\n' + text
            : text;
        }
      }
      if (current) topics.push(current);
      return topics.filter(t => t.title);
    }

    async function loadTopics(url) {
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        const rows = parseCSV(text);
        return rowsToTopics(rows);
      } catch (e) {
        console.error('Failed to load lessons:', e);
        return null;
      }
    }

    /* ── Step 1: Sort function ── */
    function sortTopics(topics) {
      return [...topics].sort((a, b) => {
        if (b.recurrence_count !== a.recurrence_count) {
          return b.recurrence_count - a.recurrence_count;
        }
        return a.title.localeCompare(b.title, 'he');
      });
    }

    /* ── Step 2: Badge + card render functions + displayedTopics + renderMainView ── */
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderBadge(count) {
      if (count <= 1) return '';
      return `<span class="badge">חזר ${count} פעמים</span>`;
    }

    function renderCard(topic, index) {
      return `
        <div class="topic-card" data-index="${index}" role="button" tabindex="0">
          <span class="topic-card-title">${escapeHtml(topic.title)}</span>
          ${renderBadge(topic.recurrence_count)}
          <span class="topic-card-arrow">&#8592;</span>
        </div>
      `;
    }

    let displayedTopics = [];

    function renderMainView(topics) {
      const list = document.getElementById('topic-list');
      if (!topics) {
        list.innerHTML = '<div class="status-msg error">לא ניתן לטעון את הנתונים, נסה שוב</div>';
        displayedTopics = [];
        return;
      }
      if (topics.length === 0) {
        list.innerHTML = '<div class="status-msg">אין נושאים להצגה כרגע</div>';
        displayedTopics = [];
        return;
      }
      displayedTopics = topics;
      list.innerHTML = topics.map((t, i) => renderCard(t, i)).join('');
    }

    /* ── Step 3: Search filter function ── */
    function filterTopics(topics, query) {
      if (!query) return topics;
      const q = query.toLowerCase();
      return topics.filter(t =>
        [t.title, t.causes, t.conclusions, t.actions]
          .some(field => field.toLowerCase().includes(q))
      );
    }

    /* ── Step 4: Wire up initMainView ── */
    let allTopics = [];

    function renderSection(title, body, extraClass) {
      if (!body) return '';
      const lines = body.split('\n').map(l => l.trim()).filter(l => l);
      const content = lines.length > 1
        ? '<ol class="section-list">' + lines.map(l => `<li>${escapeHtml(l)}</li>`).join('') + '</ol>'
        : `<div class="section-body">${escapeHtml(body)}</div>`;
      return `
        <div class="section${extraClass ? ' ' + extraClass : ''}">
          <div class="section-title">${escapeHtml(title)}</div>
          ${content}
        </div>
      `;
    }

    function showView(viewId) {
      ['view-home', 'view-main', 'view-topic'].forEach(id => {
        document.getElementById(id).classList.toggle('hidden', id !== viewId);
      });
      document.getElementById('main-header').classList.toggle('hidden', viewId === 'view-home');
      document.getElementById('search').classList.toggle('hidden', viewId !== 'view-main');
      window.scrollTo(0, 0);
    }

    function showMainView() {
      showView('view-main');
    }

    function showTopicView(topic) {
      const content = document.getElementById('topic-detail-content');
      content.innerHTML = `
        <div class="topic-detail-title">${escapeHtml(topic.title)}</div>
        <div class="topic-detail-badge">${renderBadge(topic.recurrence_count)}</div>
        ${renderSection('סיבות', topic.causes)}
        ${renderSection('מסקנות', topic.conclusions)}
        ${renderSection('מה יש לעשות', topic.actions, 'section-actions')}
      `;
      showView('view-topic');
    }

    async function initMainView(zone) {
      document.getElementById('main-header').querySelector('h1').textContent = zone.name;
      showView('view-main');
      renderMainView([]); // show loading state
      document.getElementById('topic-list').innerHTML = '<div class="status-msg">טוען נתונים...</div>';
      const raw = await loadTopics(zone.url);
      allTopics = raw ? sortTopics(raw) : null;
      renderMainView(allTopics || null);
    }

    // Wire up search and card clicks once (not per zone)
    document.getElementById('search').addEventListener('input', e => {
      const filtered = filterTopics(allTopics || [], e.target.value.trim());
      renderMainView(filtered);
    });

    document.getElementById('topic-list').addEventListener('click', e => {
      const card = e.target.closest('.topic-card');
      if (!card) return;
      const index = parseInt(card.dataset.index, 10);
      showTopicView(displayedTopics[index]);
    });

    document.getElementById('topic-list').addEventListener('keydown', e => {
      if ((e.key === 'Enter' || e.key === ' ') && e.target.closest('.topic-card')) {
        e.preventDefault();
        e.target.closest('.topic-card').click();
      }
    });

    function renderHomeResults(query) {
      const container = document.getElementById('home-search-results');
      const zoneList = document.getElementById('zone-list-container');
      if (!query) {
        container.classList.add('hidden');
        container.innerHTML = '';
        zoneList.classList.remove('hidden');
        return;
      }
      zoneList.classList.add('hidden');
      const q = query.toLowerCase();
      const results = [];
      ZONES.forEach(zone => {
        const topics = zonesCache[zone.id] || [];
        topics.forEach(topic => {
          if ([topic.title, topic.causes, topic.conclusions, topic.actions]
              .some(f => f.toLowerCase().includes(q))) {
            results.push({ zone, topic });
          }
        });
      });
      if (results.length === 0) {
        container.innerHTML = '<div class="status-msg">אין תוצאות</div>';
      } else {
        container.innerHTML = results.map((r, i) => `
          <div class="topic-card" data-result-index="${i}" role="button" tabindex="0">
            <span class="topic-card-title">${escapeHtml(r.topic.title)}</span>
            <span class="badge" style="background:#2a4a7a;color:#b0cfff">${escapeHtml(r.zone.name)}</span>
            ${renderBadge(r.topic.recurrence_count)}
            <span class="topic-card-arrow">&#8592;</span>
          </div>
        `).join('');
        container._results = results;
      }
      container.classList.remove('hidden');
    }

    let homeSearchDebounce = null;
    document.getElementById('home-search').addEventListener('input', e => {
      const query = e.target.value.trim();
      clearTimeout(homeSearchDebounce);
      homeSearchDebounce = setTimeout(async () => {
        if (query) {
          await loadAllZones();
        }
        renderHomeResults(query);
      }, 300);
    });

    document.getElementById('home-search-results').addEventListener('click', e => {
      const card = e.target.closest('.topic-card');
      if (!card) return;
      const idx = parseInt(card.dataset.resultIndex, 10);
      const results = document.getElementById('home-search-results')._results;
      if (!results || !results[idx]) return;
      const { zone, topic } = results[idx];
      activeZone = zone;
      document.getElementById('main-header').querySelector('h1').textContent = zone.name;
      showTopicView(topic);
    });

    // Zone buttons
    document.getElementById('view-home').addEventListener('click', e => {
      const btn = e.target.closest('.zone-btn');
      if (!btn) return;
      const zone = ZONES.find(z => z.id === btn.dataset.zone);
      if (zone) { activeZone = zone; initMainView(zone); }
    });

    document.getElementById('back-home-btn').addEventListener('click', () => {
      showView('view-home');
      document.getElementById('search').value = '';
      document.getElementById('home-search').value = '';
      renderHomeResults('');
    });

    document.getElementById('back-btn').addEventListener('click', showMainView);

    // Load all zones in background and show topic counts
    loadAllZones().then(() => {
      ZONES.forEach(zone => {
        const count = (zonesCache[zone.id] || []).length;
        const el = document.getElementById('count-' + zone.id);
        if (el) el.textContent = count + ' נושאים';
      });
    });
  </script>
</body>
</html>
