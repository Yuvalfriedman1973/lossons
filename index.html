<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>לקחים חוזרים — נהיגה מבצעית</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* ── CSS variables ── */
    :root {
      --bg:         #141a0f;
      --surface:    #1e2918;
      --card:       #253020;
      --card-hover: #2e3d28;
      --border:     #3a5030;
      --text:       #e8e8e8;
      --text-muted: #9aaa90;
      --heading:    #ffffff;
      --badge-bg:   #8b1a1a;
      --badge-text: #ffd0d0;
      --accent:     #5a8a4a;
      --search-bg:  #1a2214;
      --section-bg: #1a2214;
      --back-btn:   #3a5030;
      --back-hover: #4a6540;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: rtl;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 40px;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 16px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--heading);
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    /* ── Search ── */
    .search-bar {
      width: 100%;
      background: var(--search-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      font-size: 15px;
      direction: rtl;
      outline: none;
    }

    .search-bar::placeholder { color: var(--text-muted); }
    .search-bar:focus { border-color: var(--accent); }

    /* ── Topic list ── */
    .topic-list {
      padding: 16px 12px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .topic-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .topic-card:active { background: var(--card-hover); }

    .topic-card-title {
      font-size: 16px;
      font-weight: 500;
      color: var(--heading);
      flex: 1;
      line-height: 1.4;
    }

    .topic-card-arrow {
      color: var(--text-muted);
      font-size: 18px;
      flex-shrink: 0;
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      background: var(--badge-bg);
      color: var(--badge-text);
      font-size: 12px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Topic detail view ── */
    .view-topic {
      padding: 0 12px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--back-btn);
      color: var(--text);
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-family: 'Heebo', sans-serif;
      font-size: 14px;
      cursor: pointer;
      margin: 14px 0 16px;
      transition: background 0.15s;
    }

    .back-btn:active { background: var(--back-hover); }

    .topic-detail-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--heading);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .topic-detail-badge {
      margin-bottom: 18px;
    }

    .section {
      background: var(--section-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .section-body {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      white-space: pre-wrap;
    }

    /* ── Status messages ── */
    .status-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 16px;
    }

    .status-msg.error { color: #e07070; }

    /* ── Hidden utility ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app">

    <!-- Main view -->
    <div id="view-main">
      <div class="header">
        <h1>לקחים חוזרים — נהיגה מבצעית</h1>
        <input
          id="search"
          class="search-bar"
          type="search"
          placeholder="חיפוש..."
          aria-label="חיפוש בלקחים"
        />
      </div>
      <div id="topic-list" class="topic-list">
        <div class="status-msg">טוען נתונים...</div>
      </div>
    </div>

    <!-- Topic detail view -->
    <div id="view-topic" class="hidden">
      <div class="header">
        <h1>לקחים חוזרים — נהיגה מבצעית</h1>
      </div>
      <div class="view-topic">
        <button class="back-btn" id="back-btn">&#8594; חזרה לרשימה</button>
        <div id="topic-detail-content"></div>
      </div>
    </div>

  </div>
  <script>

    const SHEET_CSV_URL = 'YOUR_GOOGLE_SHEET_CSV_URL_HERE';
  </script>
</body>
</html>
