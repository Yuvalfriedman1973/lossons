<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>לקחים חוזרים — נהיגה מבצעית</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* ── CSS variables ── */
    :root {
      --bg:         #141a0f;
      --surface:    #1e2918;
      --card:       #253020;
      --card-hover: #2e3d28;
      --border:     #3a5030;
      --text:       #e8e8e8;
      --text-muted: #9aaa90;
      --heading:    #ffffff;
      --badge-bg:   #8b1a1a;
      --badge-text: #ffd0d0;
      --accent:     #5a8a4a;
      --search-bg:  #1a2214;
      --section-bg: #1a2214;
      --back-btn:   #3a5030;
      --back-hover: #4a6540;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: rtl;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 40px;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 16px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--heading);
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    /* ── Search ── */
    .search-bar {
      width: 100%;
      background: var(--search-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      font-size: 16px; /* ≥16px prevents iOS Safari auto-zoom */
      direction: rtl;
      outline: none;
      -webkit-appearance: none; /* removes iOS Safari system search-input styling */
      appearance: none;
    }

    .search-bar::placeholder { color: var(--text-muted); }
    .search-bar:focus { border-color: var(--accent); }

    /* ── Topic list ── */
    .topic-list {
      padding: 16px 12px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .topic-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      -webkit-tap-highlight-color: transparent; /* suppress browser blue tap flash */
    }

    .topic-card:active { background: var(--card-hover); }

    .topic-card-title {
      font-size: 16px;
      font-weight: 500;
      color: var(--heading);
      flex: 1;
      line-height: 1.4;
    }

    .topic-card-arrow {
      color: var(--text-muted);
      font-size: 18px;
      flex-shrink: 0;
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      background: var(--badge-bg);
      color: var(--badge-text);
      font-size: 12px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Topic detail view ── */
    .view-topic {
      padding: 0 12px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--back-btn);
      color: var(--text);
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-family: 'Heebo', sans-serif;
      font-size: 14px;
      cursor: pointer;
      margin: 14px 0 16px;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent; /* suppress browser blue tap flash */
    }

    .back-btn:active { background: var(--back-hover); }

    .topic-detail-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--heading);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .topic-detail-badge {
      margin-bottom: 18px;
    }

    .section {
      background: var(--section-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .section-body {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .section-list {
      margin: 0;
      padding-right: 20px;
      color: var(--text);
      font-size: 15px;
      line-height: 1.8;
    }

    .section-list li {
      margin-bottom: 4px;
    }

    /* ── Status messages ── */
    .status-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 16px;
    }

    .status-msg.error { color: #e07070; }

    /* ── Hidden utility ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app">

    <!-- Shared header (single <h1> in DOM); JS toggles #search visibility when switching views -->
    <div class="header" id="main-header">
      <h1>לקחים חוזרים — נהיגה מבצעית</h1>
      <input
        id="search"
        class="search-bar"
        type="search"
        placeholder="חיפוש..."
        aria-label="חיפוש בלקחים"
      />
    </div>

    <!-- Main view (no header inside) -->
    <div id="view-main">
      <div id="topic-list" class="topic-list">
        <div class="status-msg">טוען נתונים...</div>
      </div>
    </div>

    <!-- Topic detail view (no header inside) -->
    <div id="view-topic" class="hidden">
      <div class="view-topic">
        <button class="back-btn" id="back-btn">&#8594; חזרה לרשימה</button>
        <div id="topic-detail-content"></div>
      </div>
    </div>

  </div>
  <script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRU3T8932BlscRE4i9IxwNE2gntwny714mhYASMdp_h_2MHlN2kFFIesbCLiwgP_ZnVcSbilm2-BxSj/pub?gid=0&single=true&output=csv';

    function parseCSV(text) {
      const rows = [];
      text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      let i = 0;
      while (i < text.length) {
        const row = [];
        while (i < text.length) {
          let field = '';
          if (text[i] === '"') {
            i++;
            while (i < text.length) {
              if (text[i] === '"') {
                if (text[i + 1] === '"') { field += '"'; i += 2; }
                else { i++; break; }
              } else {
                field += text[i++];
              }
            }
          } else {
            while (i < text.length && text[i] !== ',' && text[i] !== '\n') {
              field += text[i++];
            }
            field = field.trim();
          }
          row.push(field);
          if (i < text.length && text[i] === ',') { i++; }
          else { break; }
        }
        if (i < text.length && text[i] === '\n') i++;
        if (row.length > 0 && !(row.length === 1 && row[0] === '')) rows.push(row);
      }
      return rows;
    }

    function rowsToTopics(rows) {
      return rows.slice(1).map(row => ({
        title:            row[0] || '',
        recurrence_count: parseInt(row[1], 10) || 1,
        causes:           row[2] || '',
        conclusions:      row[3] || '',
        actions:          row[4] || '',
      })).filter(t => t.title);
    }

    async function loadTopics() {
      try {
        const res = await fetch(SHEET_CSV_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        const rows = parseCSV(text);
        return rowsToTopics(rows);
      } catch (e) {
        console.error('Failed to load lessons:', e);
        return null;
      }
    }

    /* ── Step 1: Sort function ── */
    function sortTopics(topics) {
      return [...topics].sort((a, b) => {
        if (b.recurrence_count !== a.recurrence_count) {
          return b.recurrence_count - a.recurrence_count;
        }
        return a.title.localeCompare(b.title, 'he');
      });
    }

    /* ── Step 2: Badge + card render functions + displayedTopics + renderMainView ── */
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderBadge(count) {
      if (count <= 1) return '';
      return `<span class="badge">חזר ${count} פעמים</span>`;
    }

    function renderCard(topic, index) {
      return `
        <div class="topic-card" data-index="${index}" role="button" tabindex="0">
          <span class="topic-card-title">${escapeHtml(topic.title)}</span>
          ${renderBadge(topic.recurrence_count)}
          <span class="topic-card-arrow">&#8592;</span>
        </div>
      `;
    }

    let displayedTopics = [];

    function renderMainView(topics) {
      const list = document.getElementById('topic-list');
      if (!topics) {
        list.innerHTML = '<div class="status-msg error">לא ניתן לטעון את הנתונים, נסה שוב</div>';
        displayedTopics = [];
        return;
      }
      if (topics.length === 0) {
        list.innerHTML = '<div class="status-msg">אין נושאים להצגה כרגע</div>';
        displayedTopics = [];
        return;
      }
      displayedTopics = topics;
      list.innerHTML = topics.map((t, i) => renderCard(t, i)).join('');
    }

    /* ── Step 3: Search filter function ── */
    function filterTopics(topics, query) {
      if (!query) return topics;
      const q = query.toLowerCase();
      return topics.filter(t =>
        [t.title, t.causes, t.conclusions, t.actions]
          .some(field => field.toLowerCase().includes(q))
      );
    }

    /* ── Step 4: Wire up initMainView ── */
    let allTopics = [];

    function renderSection(title, body) {
      if (!body) return '';
      const lines = body.split('\n').map(l => l.trim()).filter(l => l);
      const content = lines.length > 1
        ? '<ol class="section-list">' + lines.map(l => `<li>${escapeHtml(l)}</li>`).join('') + '</ol>'
        : `<div class="section-body">${escapeHtml(body)}</div>`;
      return `
        <div class="section">
          <div class="section-title">${escapeHtml(title)}</div>
          ${content}
        </div>
      `;
    }

    function showView(viewId) {
      const isMain = viewId === 'view-main';
      document.getElementById('view-main').classList.toggle('hidden', !isMain);
      document.getElementById('view-topic').classList.toggle('hidden', isMain);
      document.getElementById('search').classList.toggle('hidden', !isMain);
      window.scrollTo(0, 0);
    }

    function showMainView() {
      showView('view-main');
    }

    function showTopicView(topic) {
      const content = document.getElementById('topic-detail-content');
      content.innerHTML = `
        <div class="topic-detail-title">${escapeHtml(topic.title)}</div>
        <div class="topic-detail-badge">${renderBadge(topic.recurrence_count)}</div>
        ${renderSection('סיבות', topic.causes)}
        ${renderSection('מסקנות', topic.conclusions)}
        ${renderSection('מה יש לעשות', topic.actions)}
      `;
      showView('view-topic');
    }

    async function initMainView() {
      const raw = await loadTopics();
      allTopics = raw ? sortTopics(raw) : null;
      renderMainView(allTopics || null);

      document.getElementById('search').addEventListener('input', e => {
        const filtered = filterTopics(allTopics || [], e.target.value.trim());
        renderMainView(filtered);
      });

      document.getElementById('topic-list').addEventListener('click', e => {
        const card = e.target.closest('.topic-card');
        if (!card) return;
        const index = parseInt(card.dataset.index, 10);
        showTopicView(displayedTopics[index]);
      });

      document.getElementById('topic-list').addEventListener('keydown', e => {
        if ((e.key === 'Enter' || e.key === ' ') && e.target.closest('.topic-card')) {
          e.preventDefault();
          e.target.closest('.topic-card').click();
        }
      });
    }

    initMainView();

    document.getElementById('back-btn').addEventListener('click', showMainView);
  </script>
</body>
</html>
